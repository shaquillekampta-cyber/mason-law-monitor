services:
  - type: web
    name: mason-law-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DIGEST_EMAIL_FROM
        sync: false
      - key: DIGEST_EMAIL_TO
        sync: false
      - key: DIGEST_EMAIL_PASS
        sync: false
